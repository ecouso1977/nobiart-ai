# ─────────────────────────────────────────────────────────────────
# SenGuard – Cloud Build CI/CD Pipeline
# GitHub Repo : https://github.com/ecouso1977/nobiart-ai
# Triggers on : push to main branch
#
# SUBSTITUTION VARIABLES (set in Cloud Build trigger UI):
#   _REGION          : GCP region            (default: us-central1)
#   _REPO            : Artifact Registry repo (default: senguard)
#   _BACKEND_URL     : Backend Cloud Run URL  (set after first deploy)
#
# SECRETS (create in GCP Secret Manager before first run):
#   senguard-mongo-url        → your MongoDB Atlas connection string
#   senguard-jwt-secret       → your JWT secret key
#   senguard-gemini-key       → your Gemini API key
#   senguard-emergent-key     → your Emergent LLM key
#   senguard-admin-email      → admin@senguard.com
#   senguard-admin-password   → SenGuard2024! (or your chosen password)
# ─────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: senguard
  _BACKEND_URL: https://senguard-backend-REPLACE_AFTER_FIRST_DEPLOY.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:

  # ── 1. Build Backend Image ──────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - -f
      - Dockerfile.backend
      - .
    waitFor: ['-']

  # ── 2. Build Frontend Image (needs REACT_APP_BACKEND_URL at build) ─
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
      - --build-arg
      - REACT_APP_BACKEND_URL=${_BACKEND_URL}
      - -f
      - Dockerfile.frontend
      - .
    waitFor: ['-']

  # ── 3. Push Backend Image ───────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend
    waitFor: [build-backend]

  # ── 4. Push Frontend Image ──────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend
    waitFor: [build-frontend]

  # ── 5. Deploy Backend to Cloud Run ─────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - senguard-backend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=DB_NAME=senguard_db,CORS_ORIGINS=*,FRONTEND_URL=${_BACKEND_URL}
      - --set-secrets=MONGO_URL=senguard-mongo-url:latest,JWT_SECRET=senguard-jwt-secret:latest,GEMINI_API_KEY=senguard-gemini-key:latest,GOOGLE_API_KEY=senguard-gemini-key:latest,EMERGENT_LLM_KEY=senguard-emergent-key:latest,ADMIN_EMAIL=senguard-admin-email:latest,ADMIN_PASSWORD=senguard-admin-password:latest
    waitFor: [push-backend]

  # ── 6. Deploy Frontend to Cloud Run ────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - senguard-frontend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=200
    waitFor: [push-frontend]

# Images stored in Artifact Registry
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
